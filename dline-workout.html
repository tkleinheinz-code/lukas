<!DOCTYPE html>
<html>
<head>
  <title>Lukas Kleinheinz, D-Line Workout Log</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .day {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    input {
      width: 90%;
      padding: 5px;
      text-align: center;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background: #0078D4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Lukas Kleinheinz, D-Line Workout Log</h1>

<div id="workout"></div>

<div style="text-align:center;">
  <button onclick="saveData()">Save</button>
  <button onclick="loadData()">Load</button>
</div>

<script>
const workouts = [
  {
    name: "Day 1 – Lower Strength + Burst",
    exercises: [
      "Squat",
      "Trap Bar Deadlift",
      "Box Jumps",
      "Walking Lunges",
      "Plank"
    ]
  },
  {
    name: "Day 2 – Upper Power",
    exercises: [
      "Bench Press",
      "Push Press",
      "Barbell Row",
      "Face Pulls",
      "Band Punches"
    ]
  },
  {
    name: "Day 3 – Speed + Agility",
    exercises: [
      "10-yard burst",
      "20-yard sprint",
      "Cone drills",
      "Ladder drills"
    ]
  },
  {
    name: "Day 4 – Lower Explosive",
    exercises: [
      "Deadlift",
      "Box Squat",
      "Broad Jump",
      "Bulgarian Split Squat",
      "Hamstring Curl"
    ]
  },
  {
    name: "Day 5 – Upper Strength",
    exercises: [
      "Incline Bench",
      "Pull-ups",
      "Dips",
      "Shrugs",
      "Farmer Carry"
    ]
  }
];

const container = document.getElementById("workout");

function createTable(dayIndex, workout) {
  let html = `<div class="day"><h2>${workout.name}</h2><table>`;
  
  html += `
    <tr>
      <th>Exercise</th>
      <th>Set 1</th>
      <th>Set 2</th>
      <th>Set 3</th>
      <th>Set 4</th>
      <th>Set 5</th>
    </tr>`;

  workout.exercises.forEach((ex, exIndex) => {
    html += `<tr><td>${ex}</td>`;

    for (let set = 0; set < 5; set++) {
      let id = `${dayIndex}-${exIndex}-${set}`;
      html += `<td><input id="${id}" placeholder="wt x reps"></td>`;
    }

    html += "</tr>";
  });

  html += "</table></div>";
  return html;
}

// Render everything
workouts.forEach((workout, i) => {
  container.innerHTML += createTable(i, workout);
});

// Save data
function saveData() {
  let inputs = document.querySelectorAll("input");
  let data = {};

  inputs.forEach(input => {
    data[input.id] = input.value;
  });

  localStorage.setItem("dlData", JSON.stringify(data));
  alert("Saved ✅");
}

// Load data
function loadData() {
  let data = JSON.parse(localStorage.getItem("dlData"));

  if (!data) {
    alert("No saved data found");
    return;
  }

  Object.keys(data).forEach(id => {
    let el = document.getElementById(id);
    if (el) el.value = data[id];
  });

  alert("Loaded ✅");
}
</script>

</body>
</html>
