<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lukas Football Workout Tracker</title>

  <!-- ✅ FIXED: Proper manifest link tag -->
  <link rel="manifest" href="manifest.json">

  <!-- ✅ FIXED: Proper theme color meta tag -->
  <meta name="theme-color" content="#cfcf1d">

  <!-- ✅ FIXED: Proper apple touch icon link tag -->
  <link rel="apple-touch-icon" href="images/Lukas_workout_app_image.png">

  <!-- ✅ FIXED: Proper Chart.js script tag -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

    :root {
      --gold: #cfcf1d;
      --gold-dim: #a8a817;
      --navy: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --muted: #64748b;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: white;
      min-height: 100vh;
      padding: 12px;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      text-shadow: 0 0 30px rgba(207,207,29,0.3);
    }

    h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .card {
      background: var(--card);
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    /* Toggle */
    .toggle {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .toggle button {
      width: 45%;
      padding: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle button.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }

    .toggle button.inactive {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    /* Form inputs */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--navy);
      color: white;
      text-align: center;
    }

    .form-group select {
      text-align: left;
      cursor: pointer;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      margin-top: 6px;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 7px 5px;
      text-align: center;
      font-size: 12px;
    }

    th {
      background: var(--gold);
      color: black;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    td:first-child {
      text-align: left;
      padding-left: 8px;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }

    tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    table input {
      width: 58px;
      padding: 4px;
      font-size: 11px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--navy);
      color: white;
      text-align: center;
      font-family: 'Barlow', sans-serif;
    }

    table input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .pr-badge {
      color: var(--gold);
      font-weight: bold;
      margin-left: 4px;
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .action-row button, .card > button {
      padding: 11px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--gold);
      color: #000;
      width: 100%;
    }

    .btn-primary:hover { background: var(--gold-dim); }

    .btn-secondary {
      background: var(--card);
      color: white;
      border: 1px solid var(--border) !important;
      flex: 1;
    }

    .btn-secondary:hover { border-color: var(--gold) !important; color: var(--gold); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red) !important;
      flex: 1;
    }

    #installBtn { display: none; }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gold);
      color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.05em;
      padding: 10px 24px;
      border-radius: 30px;
      transition: transform 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    .set-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.controls {
  display: flex;
  align-items: center;
  gap: 4px;
}

.controls button {
  width: 22px;
  height: 22px;
  font-size: 12px;
  font-weight: bold;
  border-radius: 4px;
  border: none;
  background: var(--border);
  color: white;
}

.weight {
  font-size: 12px;
  width: 28px;
  text-align: center;
}

.done-btn {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  border: none;
  background: var(--gold);
  color: black;
}
  </style>
</head>

<body>

<h1>🏈 Lukas Football Tracker</h1>

<div class="toggle">
  <button id="olBtn" class="active" onclick="setMode('OL')">OL</button>
  <button id="dlBtn" class="inactive" onclick="setMode('DL')">DL</button>
</div>

<div class="card">
  <h2>Max & Week</h2>
  <div class="form-grid">
    <div class="form-group">
      <label>Squat Max (lbs)</label>
      <input id="squatMax" type="number" placeholder="e.g. 315">
    </div>
    <div class="form-group">
      <label>Bench Max (lbs)</label>
      <input id="benchMax" type="number" placeholder="e.g. 225">
    </div>
    <div class="form-group">
      <label>Deadlift Max (lbs)</label>
      <input id="deadMax" type="number" placeholder="e.g. 405">
    </div>
    <div class="form-group">
      <label>Training Week</label>
      <select id="weekSelect">
        <option value="1">Week 1</option>
        <option value="2">Week 2</option>
        <option value="3">Week 3</option>
        <option value="4">Week 4</option>
      </select>
    </div>
  </div>
  <button class="btn-primary" onclick="applyWeights()">⚡ Auto-Fill Weights</button>
</div>

<div id="workout"></div>

<div class="action-row">
  <button class="btn-secondary" onclick="saveData()">💾 Save</button>
  <button class="btn-secondary" onclick="loadData()">📂 Load</button>
  <button class="btn-danger" onclick="clearHistory()">🗑 Clear History</button>
  <button id="installBtn" class="btn-secondary" onclick="installApp()">📲 Install App</button>
</div>

<div class="card">
  <h2>📈 Strength Progress</h2>
  <canvas id="progressChart"></canvas>
</div>

<div id="toast">✅ Saved!</div>

<script>

// ─── State ───────────────────────────────────────────────────────────────────
let mode = "OL";

const OL = [
  { name: "Day 1", exercises: ["Squat", "Deadlift", "Leg Press", "Lunges", "Calf Raises", "Plank"] },
  { name: "Day 2", exercises: ["Bench", "Incline DB", "Row", "Close Grip", "Face Pull", "Shrugs"] },
  { name: "Day 3", exercises: ["Deadlift", "Box Squat", "Split Squat", "Ham Curl", "Goblet Squat", "Core"] },
  { name: "Day 4", exercises: ["Push Press", "Incline Bench", "Pull-ups", "Dips", "Lateral Raise", "Triceps"] },
  { name: "Day 5", exercises: ["Farmer Carry", "Sled Push", "Tire Flip", "Hold", "Med Ball", "Neck"] }
];

const DL = [
  { name: "Day 1", exercises: ["Squat", "Deadlift", "Box Jump", "Broad Jump", "Lunges", "Plank"] },
  { name: "Day 2", exercises: ["Bench", "Push Press", "Row", "Face Pull", "Band Punch", "Shrugs"] },
  { name: "Day 3", exercises: ["Sprint", "Sprint", "Cone", "Ladder", "Sled", "Core"] },
  { name: "Day 4", exercises: ["Deadlift", "Box Squat", "Split Squat", "Ham Curl", "Jump Squat", "Core"] },
  { name: "Day 5", exercises: ["Incline Bench", "Pull-ups", "Dips", "Farmer Carry", "Med Ball", "Grip"] }
];

// ─── Render workout tables ────────────────────────────────────────────────────
function render() {
  const container = document.getElementById("workout");
  container.innerHTML = "";
  const workouts = mode === "OL" ? OL : DL;
  const prFlags = JSON.parse(localStorage.getItem("prFlags")) || {};

  workouts.forEach((day, d) => {
    let html = `<div class="card"><h3>${day.name}</h3><div class="table-wrap"><table>`;
    html += `<tr><th>Exercise</th><th>Set 1</th><th>Set 2</th><th>Set 3</th></tr>`;

    day.exercises.forEach((ex, e) => {
      let badge = "";
      if (ex.includes("Squat") && prFlags.squat) badge = ' <span class="pr-badge">🏆 PR</span>';
      if (ex.includes("Bench") && prFlags.bench) badge = ' <span class="pr-badge">🏆 PR</span>';
      if (ex.includes("Dead") && prFlags.dead)  badge = ' <span class="pr-badge">🏆 PR</span>';

      html += `<tr><td>${ex}${badge}</td>`;
      for (let s = 0; s < 3; s++) {
html += `
<td>
  <div class="set-box">
    
    <div class="controls">
      <button onclick="adjustWeight('${mode}-${d}-${e}-${s}', -5)">−</button>
      <span id="${mode}-${d}-${e}-${s}-w" class="weight">0</span>
      <button onclick="adjustWeight('${mode}-${d}-${e}-${s}', 5)">+</button>
    </div>

    <div style="font-size:10px; opacity:0.6;">x</div>

    <div class="controls">
      <button onclick="adjustReps('${mode}-${d}-${e}-${s}', -1)">−</button>
      <span id="${mode}-${d}-${e}-${s}-r" class="reps">5</span>
      <button onclick="adjustReps('${mode}-${d}-${e}-${s}', 1)">+</button>
    </div>

    <button class="done-btn" onclick="completeSet('${mode}-${d}-${e}-${s}')">✓</button>

  </div>
</td>
`;
}
      }
      html += `</tr>`;
    });

    html += `</table></div></div>`;
    container.innerHTML += html;
  });
}

render();

// ─── Mode toggle ─────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById("olBtn").className = m === "OL" ? "active" : "inactive";
  document.getElementById("dlBtn").className = m === "DL" ? "active" : "inactive";
  render();
}

// ─── Auto-fill weights ────────────────────────────────────────────────────────
// FIX: Use getElementById instead of implicit globals to avoid variable name collision
function applyWeights() {
  const squat = +document.getElementById("squatMax").value;
  const bench = +document.getElementById("benchMax").value;
  const dead  = +document.getElementById("deadMax").value;

  // FIX: Renamed from 'week' to 'weekNum' to avoid collision with the <select id="weekSelect">
  const weekNum = +document.getElementById("weekSelect").value;

const pctTable = [
  [0.65, 0.70, 0.75],
  [0.70, 0.75, 0.80],
  [0.80, 0.85, 0.90],
  [0.85, 0.90, 0.95]
];

  const pct = pctTable[weekNum - 1];

  workouts.forEach((day, d) => {
    day.exercises.forEach((ex, e) => {
      let max = 0;
      if (ex.includes("Squat")) max = squat;
      if (ex.includes("Bench")) max = bench;
      if (ex.includes("Dead"))  max = dead;

      }
    });

}

// ─── Save data ────────────────────────────────────────────────────────────────
function saveData() {
  const history = JSON.parse(localStorage.getItem("history")) || [];

  const newEntry = {
    date:  new Date().toLocaleDateString(),
    squat: +document.getElementById("squatMax").value,
    bench: +document.getElementById("benchMax").value,
    dead:  +document.getElementById("deadMax").value
  };

  const prev = history.length > 0 ? history[history.length - 1] : null;

  const prFlags = { squat: false, bench: false, dead: false };
  if (prev) {
    if (newEntry.squat > prev.squat) prFlags.squat = true;
    if (newEntry.bench > prev.bench) prFlags.bench = true;
    if (newEntry.dead  > prev.dead)  prFlags.dead  = true;
  }

  localStorage.setItem("prFlags", JSON.stringify(prFlags));
  history.push(newEntry);
  localStorage.setItem("history", JSON.stringify(history));

  updateChart();
  render();
  showToast("✅ Saved!");
}

// ─── FIX: Load data — was defined as a button but function didn't exist ───────
function loadData() {
  const history = JSON.parse(localStorage.getItem("history")) || [];

  if (history.length === 0) {
    showToast("No saved data found.");
    return;
  }

  const last = history[history.length - 1];
  document.getElementById("squatMax").value = last.squat || "";
  document.getElementById("benchMax").value = last.bench || "";
  document.getElementById("deadMax").value  = last.dead  || "";

  updateChart();
  showToast("📂 Loaded last session!");
}

// ─── Clear history ────────────────────────────────────────────────────────────
function clearHistory() {
  if (!confirm("Clear all saved history?")) return;
  localStorage.removeItem("history");
  localStorage.removeItem("prFlags");
  updateChart();
  render();
  showToast("🗑 History cleared.");
}

// ─── Chart ────────────────────────────────────────────────────────────────────
let chart;

function updateChart() {
  const history = JSON.parse(localStorage.getItem("history")) || [];
  const ctx = document.getElementById("progressChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: history.map(x => x.date),
      datasets: [
        {
          label: "Squat",
          data: history.map(x => x.squat),
          borderColor: "#cfcf1d",
          backgroundColor: "rgba(207,207,29,0.08)",
          tension: 0.3,
          pointRadius: 4
        },
        {
          label: "Bench",
          data: history.map(x => x.bench),
          borderColor: "#3b82f6",
          backgroundColor: "rgba(59,130,246,0.08)",
          tension: 0.3,
          pointRadius: 4
        },
        {
          label: "Deadlift",
          data: history.map(x => x.dead),
          borderColor: "#ef4444",
          backgroundColor: "rgba(239,68,68,0.08)",
          tension: 0.3,
          pointRadius: 4
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          labels: { color: "white", font: { family: "Barlow Condensed", size: 13, weight: "700" } }
        }
      },
      scales: {
        x: {
          ticks: { color: "#94a3b8" },
          grid: { color: "rgba(255,255,255,0.05)" }
        },
        y: {
          ticks: { color: "#94a3b8" },
          grid: { color: "rgba(255,255,255,0.05)" }
        }
      }
    }
  });
}

updateChart();

// ─── Toast notification ───────────────────────────────────────────────────────
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

// ─── PWA: Service Worker ──────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("✅ Service worker registered"))
      .catch(err => console.warn("Service worker registration failed:", err));
  });
}

// ─── PWA: Install prompt ──────────────────────────────────────────────────────
let deferredPrompt;

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
}
function adjust(id, change) {
  const el = document.getElementById(id);
  let val = parseInt(el.innerText) || 0;
  val += change;
  if (val < 0) val = 0;
  el.innerText = val;
}

function completeSet(id) {
  const el = document.getElementById(id);
  el.parentElement.parentElement.style.background = "#22c55e";
  el.parentElement.parentElement.style.color = "#000";
}
  function adjustWeight(id, change) {
  const el = document.getElementById(id + "-w");
  let val = parseInt(el.innerText) || 0;
  val += change;
  if (val < 0) val = 0;
  el.innerText = val;
}

function adjustReps(id, change) {
  const el = document.getElementById(id + "-r");
  let val = parseInt(el.innerText) || 0;
  val += change;
  if (val < 0) val = 0;
  el.innerText = val;
}
</script>
</body>
</html>
