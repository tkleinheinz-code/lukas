<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5/3/1 Workout Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f5f5f3;
    --color-bg-info: #e6f1fb;
    --color-bg-success: #eaf3de;
    --color-bg-warning: #faeeda;
    --color-text: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-info: #185fa5;
    --color-text-success: #3b6d11;
    --color-text-warning: #854f0b;
    --color-border: rgba(0,0,0,0.15);
    --color-border-secondary: rgba(0,0,0,0.25);
    --color-border-info: rgba(24,95,165,0.35);
    --color-border-success: rgba(59,109,17,0.35);
    --color-border-warning: rgba(133,79,11,0.35);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-bg-secondary: #2c2c2a;
      --color-bg-info: #042c53;
      --color-bg-success: #173404;
      --color-bg-warning: #412402;
      --color-text: #f0efe8;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-text-success: #97c459;
      --color-text-warning: #ef9f27;
      --color-border: rgba(255,255,255,0.15);
      --color-border-secondary: rgba(255,255,255,0.25);
    }
  }

  body {
    font-family: var(--font);
    background: var(--color-bg-secondary);
    color: var(--color-text);
    min-height: 100vh;
    padding: 1.5rem 1rem;
  }

  .container { max-width: 860px; margin: 0 auto; }

  .header { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 1.5rem; }
  .header h1 { font-size: 20px; font-weight: 500; flex: 1; }

  .tabs { display: flex; gap: 6px; }
  .tab {
    padding: 6px 14px; font-size: 13px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--radius-md); cursor: pointer;
    background: var(--color-bg); color: var(--color-text-secondary);
    transition: all 0.15s; font-family: var(--font);
  }
  .tab.active { background: var(--color-bg-secondary); color: var(--color-text); border-color: var(--color-border-secondary); font-weight: 500; }

  .week-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .wtab {
    padding: 5px 12px; font-size: 12px;
    border: 0.5px solid var(--color-border); border-radius: var(--radius-md);
    cursor: pointer; background: var(--color-bg); color: var(--color-text-secondary);
    font-family: var(--font);
  }
  .wtab.active { background: var(--color-bg-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }

  .card {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .card h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 11px; font-weight: 500; color: var(--color-text-secondary);
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 6px 8px; border-bottom: 0.5px solid var(--color-border); text-align: left;
  }
  td { padding: 8px; border-bottom: 0.5px solid var(--color-border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  td:first-child { font-size: 13px; min-width: 120px; }

  .set-box { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 90px; }
  .controls { display: flex; align-items: center; gap: 4px; }
  .controls button {
    width: 24px; height: 24px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 4px; background: var(--color-bg-secondary);
    color: var(--color-text); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }
  .controls button:active { transform: scale(0.95); }
  .weight { font-size: 14px; font-weight: 500; min-width: 52px; text-align: center; }
  .reps { font-size: 12px; min-width: 20px; text-align: center; color: var(--color-text-secondary); }
  .x-label { font-size: 10px; color: var(--color-text-tertiary); }
  .note { font-size: 11px; color: var(--color-text-tertiary); }

  .done-btn {
    margin-top: 2px; padding: 3px 10px; font-size: 11px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--radius-md); background: var(--color-bg);
    cursor: pointer; color: var(--color-text-secondary);
    transition: all 0.15s; font-family: var(--font);
  }
  .done-btn.completed { background: var(--color-bg-success); color: var(--color-text-success); border-color: var(--color-border-success); }

  .pr-badge {
    font-size: 10px; background: var(--color-bg-warning);
    color: var(--color-text-warning); border-radius: 4px;
    padding: 1px 5px; font-weight: 500;
  }

  .pr-panel { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .pr-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border: 0.5px solid var(--color-border);
    border-radius: var(--radius-md); cursor: pointer;
    background: var(--color-bg); font-size: 12px;
    color: var(--color-text-secondary); user-select: none;
    font-family: var(--font);
  }
  .pr-toggle.on { background: var(--color-bg-warning); color: var(--color-text-warning); border-color: var(--color-border-warning); }
  .pr-toggle i { font-size: 15px; }

  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

  .orm-card {
    background: var(--color-bg);
    border: 0.5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .orm-card h2 { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 1rem; }
  .orm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .orm-field { display: flex; flex-direction: column; gap: 5px; }
  .orm-field label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; }
  .orm-row { display: flex; align-items: center; gap: 6px; }
  .orm-input {
    width: 80px; padding: 5px 8px; font-size: 14px; font-weight: 500;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--radius-md); background: var(--color-bg);
    color: var(--color-text); font-family: var(--font);
    text-align: right;
  }
  .orm-input:focus { outline: none; border-color: var(--color-text-info); box-shadow: 0 0 0 2px var(--color-bg-info); }
  .orm-unit { font-size: 12px; color: var(--color-text-tertiary); }
  .orm-derived { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
</style>
</head>
<body>
<div class="container">
  <h2 class="sr-only">5/3/1 workout tracker — adjust weights and reps per set, mark sets complete</h2>
  <div id="root"></div>
</div>

<script>
const EXERCISES = ['Squat', 'Deadlift', 'Bench', 'Overhead Press'];

const WEEKS = [
  { label: 'Week 1',        reps: [5, 5, '5+'], pcts: [65, 75, 85] },
  { label: 'Week 2',        reps: [5, 5, '5+'], pcts: [70, 80, 90] },
  { label: 'Week 3',        reps: [5, 5, '5+'], pcts: [75, 85, 95] },
  { label: 'Week 4 Deload', reps: [5, 5,   5 ], pcts: [40, 50, 60] }
];

const DAY_PROGRAMS = {
  OL: [
    { name: 'Day 1 — Overhead Press + Squat', exercises: ['Overhead Press', 'Squat'] },
    { name: 'Day 2 — Deadlift + Bench',       exercises: ['Deadlift', 'Bench'] },
    { name: 'Day 3 — Bench + Deadlift',       exercises: ['Bench', 'Deadlift'] },
    { name: 'Day 4 — Squat + Overhead Press', exercises: ['Squat', 'Overhead Press'] }
  ],
  DL: [
    { name: 'Day 1 — Squat',           exercises: ['Squat'] },
    { name: 'Day 2 — Bench',           exercises: ['Bench'] },
    { name: 'Day 3 — Deadlift',        exercises: ['Deadlift'] },
    { name: 'Day 4 — Overhead Press',  exercises: ['Overhead Press'] }
  ]
};

// 5/3/1 uses 90% of 1RM as the training max
function trainingMax(ex) { return state.oneRM[ex] * 0.9; }

// Weight for a given set = training max × week percentage, rounded to nearest 2.5 lb
function calcWeight(ex, weekIdx, setIdx) {
  const tm = trainingMax(ex);
  const pct = WEEKS[weekIdx].pcts[setIdx] / 100;
  return Math.round(tm * pct / 2.5) * 2.5;
}

const state = {
  mode: 'OL',
  week: 0,
  oneRM: { Squat: 300, Deadlift: 275, Bench: 225, 'Overhead Press': 0 },
  weights: {},
  reps: {},
  done: {},
  prFlags: { Squat: false, Bench: false, Deadlift: false, 'Overhead Press': false }
};

function getKey(mode, d, e, s) { return `${mode}-${d}-${e}-${s}`; }

function getWeight(mode, d, e, s) {
  const k = getKey(mode, d, e, s);
  if (state.weights[k] !== undefined) return state.weights[k];
  const exName = DAY_PROGRAMS[mode][d].exercises[e];
  return calcWeight(exName, state.week, s);
}

function getReps(mode, d, e, s) {
  const k = getKey(mode, d, e, s);
  if (state.reps[k] !== undefined) return state.reps[k];
  const r = WEEKS[state.week].reps[s];
  return typeof r === 'string' ? 5 : r;
}

function setWeight(key, val) { state.weights[key] = Math.max(0, val); render(); }
function adjustReps(key, delta) {
  const el = document.getElementById(key + '-r');
  const cur = el ? (parseInt(el.textContent) || 5) : 5;
  state.reps[key] = Math.max(1, cur + delta);
  render();
}
function completeSet(key) { state.done[key] = !state.done[key]; render(); }
function switchMode(m) { state.mode = m; state.weights = {}; state.reps = {}; state.done = {}; render(); }
function switchWeek(w) { state.week = w; state.weights = {}; state.reps = {}; state.done = {}; render(); }
function togglePR(ex) { state.prFlags[ex] = !state.prFlags[ex]; render(); }

function updateORM(ex, val) {
  const v = parseFloat(val);
  state.oneRM[ex] = isNaN(v) ? 0 : Math.max(0, v);
  // Clear any manual weight overrides for this exercise so they recalculate
  Object.keys(state.weights).forEach(k => {
    if (k.includes(ex.replace(/ /g, '_'))) delete state.weights[k];
  });
  state.weights = {};
  render();
}

function render() {
  const days = DAY_PROGRAMS[state.mode];
  const week = WEEKS[state.week];

  let html = `
    <div class="header">
      <h1>5/3/1 workout tracker</h1>
      <div class="tabs">
        <button class="tab ${state.mode === 'OL' ? 'active' : ''}" onclick="switchMode('OL')">4-day</button>
        <button class="tab ${state.mode === 'DL' ? 'active' : ''}" onclick="switchMode('DL')">Single lift</button>
      </div>
    </div>

    <div class="orm-card">
      <h2>1 rep max</h2>
      <div class="orm-grid">
        ${EXERCISES.map(ex => {
          const orm = state.oneRM[ex];
          const tm = Math.round(orm * 0.9 * 10) / 10;
          return `
          <div class="orm-field">
            <label for="orm-${ex.replace(/ /g,'_')}">${ex}</label>
            <div class="orm-row">
              <input
                class="orm-input"
                id="orm-${ex.replace(/ /g,'_')}"
                type="number"
                min="0"
                step="5"
                value="${orm || ''}"
                placeholder="0"
                oninput="updateORM('${ex}', this.value)"
              />
              <span class="orm-unit">lb</span>
            </div>
            <div class="orm-derived">Training max: ${orm ? tm + ' lb' : '—'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="week-tabs">
      ${WEEKS.map((w, i) => `<button class="wtab ${state.week === i ? 'active' : ''}" onclick="switchWeek(${i})">${w.label}</button>`).join('')}
    </div>
    <div class="pr-panel">
      ${Object.keys(state.prFlags).map(ex => `
        <button class="pr-toggle ${state.prFlags[ex] ? 'on' : ''}" onclick="togglePR('${ex}')">
          <i class="ti ti-trophy" aria-hidden="true"></i> ${ex} PR
        </button>`).join('')}
    </div>
  `;

  days.forEach((day, d) => {
    const hasPR = day.exercises.some(ex => state.prFlags[ex]);
    html += `<div class="card"><h3>${day.name}${hasPR ? ' <span class="pr-badge">PR day</span>' : ''}</h3>
      <div class="table-wrap"><table>
        <tr>
          <th>Exercise</th>
          <th>Set 1 (${week.reps[0]} reps)</th>
          <th>Set 2 (${week.reps[1]} reps)</th>
          <th>Set 3 (${week.reps[2]} reps)</th>
        </tr>`;

    day.exercises.forEach((exName, e) => {
      html += `<tr><td>${exName}${state.prFlags[exName] ? ' <span class="pr-badge">PR</span>' : ''}</td>`;
      for (let s = 0; s < 3; s++) {
        const key = getKey(state.mode, d, e, s);
        const w = getWeight(state.mode, d, e, s);
        const r = getReps(state.mode, d, e, s);
        const pct = week.pcts[s];
        const isDone = !!state.done[key];
        html += `<td>
          <div class="set-box">
            <div class="note">${pct}%</div>
            <div class="controls">
              <button onclick="setWeight('${key}', ${w - 2.5})">−</button>
              <span id="${key}-w" class="weight">${w} lb</span>
              <button onclick="setWeight('${key}', ${w + 2.5})">+</button>
            </div>
            <span class="x-label">×</span>
            <div class="controls">
              <button onclick="adjustReps('${key}', -1)">−</button>
              <span id="${key}-r" class="reps">${r}</span>
              <button onclick="adjustReps('${key}', 1)">+</button>
            </div>
            <button class="done-btn ${isDone ? 'completed' : ''}" onclick="completeSet('${key}')">
              ${isDone ? '<i class="ti ti-check"></i> done' : 'mark done'}
            </button>
          </div>
        </td>`;
      }
      html += `</tr>`;
    });

    html += `</table></div></div>`;
  });

  document.getElementById('root').innerHTML = html;
}

render();
</script>
</body>
</html>
