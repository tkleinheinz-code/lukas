<!DOCTYPE html>
<html>
<head>
  <title>DL Workout Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 10px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
    }

    h2 {
      font-size: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #22c55e;
      color: black;
      font-size: 14px;
    }

    input {
      width: 95%;
      padding: 8px;
      font-size: 14px;
      text-align: center;
      border-radius: 6px;
      border: none;
    }

    .big-input {
      font-size: 16px;
      padding: 10px;
    }

    button {
      width: 45%;
      margin: 5px;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .save { background: #22c55e; }
    .load { background: #3b82f6; }
    .calc { background: #f59e0b; }

    .container {
      text-align: center;
    }
  </style>
</head>

<body>

<h1>DL Workout Tracker</h1>

<!-- MAX INPUT -->
<div class="card">
  <h2>Enter Your Max (1RM)</h2>
  <input class="big-input" id="squatMax" placeholder="Squat Max">
  <input class="big-input" id="benchMax" placeholder="Bench Max">
  <input class="big-input" id="deadMax" placeholder="Deadlift Max">
  <br><br>
  <button class="calc" onclick="applyWeights()">Auto Fill Weights</button>
</div>

<div id="workout"></div>

<div class="container">
  <button class="save" onclick="saveData()">Save</button>
  <button class="load" onclick="loadData()">Load</button>
</div>

<script>
const workouts = [
  {
    name: "Day 1 – Lower Strength",
    exercises: ["Squat", "Trap Bar Deadlift", "Lunges"]
  },
  {
    name: "Day 2 – Upper Power",
    exercises: ["Bench Press", "Push Press", "Row"]
  },
  {
    name: "Day 3 – Lower Explosive",
    exercises: ["Deadlift", "Box Squat", "Jumps"]
  }
];

const container = document.getElementById("workout");

// Create table
function buildWorkout() {
  workouts.forEach((day, d) => {
    let html = `<div class="card"><h2>${day.name}</h2><table>`;
    
    html += "<tr><th>Exercise</th><th>Set1</th><th>Set2</th><th>Set3</th><th>Set4</th><th>Set5</th></tr>";

    day.exercises.forEach((ex, e) => {
      html += `<tr><td>${ex}</td>`;
      for (let s = 0; s < 5; s++) {
        html += `<td><input id="${d}-${e}-${s}"></td>`;
      }
      html += "</tr>";
    });

    html += "</table></div>";
    container.innerHTML += html;
  });
}

buildWorkout();

// AUTO WEIGHTS
function applyWeights() {
  let squat = Number(document.getElementById("squatMax").value);
  let bench = Number(document.getElementById("benchMax").value);
  let dead = Number(document.getElementById("deadMax").value);

  // percentages (week 1 style)
  let pct = [0.65, 0.7, 0.75, 0.75, 0.8];

  workouts.forEach((day, d) => {
    day.exercises.forEach((ex, e) => {

      let max = 0;
      if (ex.includes("Squat")) max = squat;
      else if (ex.includes("Bench")) max = bench;
      else if (ex.includes("Deadlift")) max = dead;

      for (let s = 0; s < 5; s++) {
        let id = `${d}-${e}-${s}`;
        let input = document.getElementById(id);

        if (max > 0) {
          let weight = Math.round(max * pct[s] / 5) * 5;
          input.value = weight + " x ";
        }
      }
    });
  });

  alert("Weights Added ✅");
}

// SAVE
function saveData() {
  let inputs = document.querySelectorAll("input");
  let data = {};
  inputs.forEach(i => data[i.id] = i.value);
  localStorage.setItem("dlTracker", JSON.stringify(data));
  alert("Saved ✅");
}

// LOAD
function loadData() {
  let data = JSON.parse(localStorage.getItem("dlTracker"));
  if (!data) return alert("No data");

  Object.keys(data).forEach(id => {
    let el = document.getElementById(id);
    if (el) el.value = data[id];
  });

  alert("Loaded ✅");
}
</script>

</body>
</html>
