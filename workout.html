<!DOCTYPE html>
<html>
<head>
  <title>Lukas Football Workout Tracker</title>


  manifest.json
  <meta name="theme-color" content="#22c55e">

  https://cdn.jsdelivr.net/npm/chart.js</script>


  <style>
    body { font-family: Arial; background: #0f172a; color: white; margin: 10px; }
    h1 { text-align: center; }

    .card {
      background: #1e293b;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 12px;
    }

    .table-wrap { overflow-x: auto; }

    table {
      min-width: 600px;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 6px;
      text-align: center;
      font-size: 12px;
    }

    th { background: #22c55e; color: black; }

    input {
      width: 60px;
      padding: 4px;
      font-size: 12px;
      border-radius: 5px;
      border: none;
      text-align: center;
    }

    button {
      padding: 10px;
      margin: 5px;
      width: 45%;
      border-radius: 8px;
      border: none;
    }

    .toggle { display:flex; justify-content:center; }
    .toggle button { width:40%; }

    .active { background:#22c55e; }
    .inactive { background:#64748b; }

    .pr-badge {
      color: #22c55e;
      font-weight: bold;
      margin-left: 5px;
    }
  </style>
</head>

<body>

<h1>Lukas Football Workout Tracker</h1>

<div class="toggle">
  <button id="olBtn" class="active" onclick="setMode('OL')">OL</button>
  <button id="dlBtn" class="inactive" onclick="setMode('DL')">DL</button>
</div>

<div class="card">
  <input id="squatMax" placeholder="Squat Max"><br><br>
  <input id="benchMax" placeholder="Bench Max"><br><br>
  <input id="deadMax" placeholder="Deadlift Max"><br><br>

  <select id="week">
    <option value="1">Week 1</option>
    <option value="2">Week 2</option>
    <option value="3">Week 3</option>
    <option value="4">Week 4</option>
  </select><br><br>

  <button onclick="applyWeights()">Auto Fill Weights</button>
</div>

<div id="workout"></div>

<div style="text-align:center;">
  <button onclick="saveData()">Save</button>
  <button onclick="loadData()">Load</button>
  <button id="installBtn" style="display:none;">Install App</button>
</div>

<div class="card">
  <h2>Strength Progress</h2>
  <canvas id="progressChart"></canvas>
</div>

<script>

let mode="OL";

const OL=[
  {name:"Day 1", exercises:["Squat","Trap Deadlift","Leg Press","Lunges","Calf Raises","Plank"]},
  {name:"Day 2", exercises:["Bench","Incline DB","Row","Close Grip","Face Pull","Shrugs"]},
  {name:"Day 3", exercises:["Deadlift","Box Squat","Split Squat","Ham Curl","Goblet Squat","Core"]},
  {name:"Day 4", exercises:["Push Press","Incline Bench","Pull-ups","Dips","Lateral Raise","Triceps"]},
  {name:"Day 5", exercises:["Farmer Carry","Sled Push","Tire Flip","Hold","Med Ball","Neck"]}
];

const DL=[
  {name:"Day 1", exercises:["Squat","Trap Deadlift","Box Jump","Broad Jump","Lunges","Plank"]},
  {name:"Day 2", exercises:["Bench","Push Press","Row","Face Pull","Band Punch","Shrugs"]},
  {name:"Day 3", exercises:["Sprint","Sprint","Cone","Ladder","Sled","Core"]},
  {name:"Day 4", exercises:["Deadlift","Box Squat","Split Squat","Ham Curl","Jump Squat","Core"]},
  {name:"Day 5", exercises:["Incline Bench","Pull-ups","Dips","Farmer Carry","Med Ball","Grip"]}
];

function render(){
  const container=document.getElementById("workout");
  container.innerHTML="";
  const workouts = mode==="OL"?OL:DL;
  let prFlags=JSON.parse(localStorage.getItem("prFlags"))||{};

  workouts.forEach((day,d)=>{
    let html=`<div class="card"><h3>${day.name}</h3><div class="table-wrap"><table>`;
    html+=`<tr><th>Exercise</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>`;

    day.exercises.forEach((ex,e)=>{

      let badge="";
      if(ex.includes("Squat")&&prFlags.squat) badge=' <span class="pr-badge">🏆</span>';
      if(ex.includes("Bench")&&prFlags.bench) badge=' <span class="pr-badge">🏆</span>';
      if(ex.includes("Dead")&&prFlags.dead) badge=' <span class="pr-badge">🏆</span>';

      html+=`<tr><td>${ex}${badge}</td>`;

      for(let s=0;s<5;s++){
        html+=`<td><input id="${mode}-${d}-${e}-${s}"></td>`;
      }

      html+="</tr>";
    });

    html+="</table></div></div>";
    container.innerHTML+=html;
  });
}
render();

function setMode(m){
  mode=m;
  olBtn.className=m==="OL"?"active":"inactive";
  dlBtn.className=m==="DL"?"active":"inactive";
  render();
}

function applyWeights(){
  let squat=+squatMax.value;
  let bench=+benchMax.value;
  let dead=+deadMax.value;
  let week=+week.value;

  let pct=[[.65,.7,.75,.75,.8],[.7,.75,.8,.8,.85],[.8,.85,.9,.9,.9],[.85,.9,.9,.95,.95]][week-1];

  let workouts=mode==="OL"?OL:DL;

  workouts.forEach((day,d)=>{
    day.exercises.forEach((ex,e)=>{
      let max=0;
      if(ex.includes("Squat")) max=squat;
      if(ex.includes("Bench")) max=bench;
      if(ex.includes("Dead")) max=dead;

      for(let s=0;s<5;s++){
        let input=document.getElementById(`${mode}-${d}-${e}-${s}`);
        if(max>0){
          let w=Math.round(max*pct[s]/5)*5;
          input.value=w+" x ";
        }
      }
    });
  });
}

function saveData(){
  let history=JSON.parse(localStorage.getItem("history"))||[];

  let newEntry={
    date:new Date().toLocaleDateString(),
    squat:+squatMax.value,
    bench:+benchMax.value,
    dead:+deadMax.value
  };

  let prev=history.at(-1);

  let prFlags={squat:false,bench:false,dead:false};
  if(prev){
    if(newEntry.squat>prev.squat) prFlags.squat=true;
    if(newEntry.bench>prev.bench) prFlags.bench=true;
    if(newEntry.dead>prev.dead) prFlags.dead=true;
  }

  localStorage.setItem("prFlags",JSON.stringify(prFlags));
  history.push(newEntry);
  localStorage.setItem("history",JSON.stringify(history));

  updateChart();
  render();
}

let chart;

function updateChart(){
  let history=JSON.parse(localStorage.getItem("history"))||[];

  let ctx=document.getElementById("progressChart");

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:history.map(x=>x.date),
      datasets:[
        {label:"Squat",data:history.map(x=>x.squat),borderColor:"#22c55e"},
        {label:"Bench",data:history.map(x=>x.bench),borderColor:"#3b82f6"},
        {label:"Deadlift",data:history.map(x=>x.dead),borderColor:"#ef4444"}
      ]
    }
  });
}

updateChart();

</script>

</body>
</html>
