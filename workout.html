<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lukas Kleinheinz, Lineman Workout Log</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .day {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    input {
      width: 90%;
      padding: 5px;
      text-align: center;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      font-size: 16px;
      background: #0078D4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #005ea2;
    }
  </style>
</head>
<body>

<h1>Lineman Workout Log</h1>

<div id="workout"></div>

<button onclick="saveData()">Save Progress</button>
<button onclick="loadData()">Load Progress</button>

<script>
const workouts = {
  "Day 1 – Heavy Lower Body": [
    "Squat", "Trap Bar Deadlift", "Leg Press", "Walking Lunges", "Calf Raises", "Weighted Plank"
  ],
  "Day 2 – Heavy Upper Body": [
    "Bench Press", "Incline DB Press", "Barbell Row", "Close-Grip Bench", "Face Pulls"
  ],
  "Day 3 – Recovery": [
    "Cardio", "Stretching", "Foam Roll", "Hanging Leg Raises"
  ],
  "Day 4 – Lower Power": [
    "Deadlift", "Box Squat", "Box Jumps", "Bulgarian Split Squat", "Hamstring Curl"
  ],
  "Day 5 – Upper Power": [
    "Push Press", "Incline Bench", "Pull-ups", "Dips", "Shrugs"
  ]
};

const container = document.getElementById("workout");

function createTable(day, exercises) {
  let html = `<div class="day"><h2>${day}</h2><table>`;
  
  html += "<tr><th>Exercise</th><th>Set 1</th><th>Set 2</th><th>Set 3</th><th>Set 4</th><th>Set 5</th></tr>";

  exercises.forEach((ex, i) => {
    html += `<tr><td>${ex}</td>`;
    for (let s = 0; s < 5; s++) {
      html += `<td><input id="${day}-${i}-${s}" placeholder="wt x reps"></td>`;
    }
    html += "</tr>";
  });

  html += "</table></div>";
  return html;
}

for (let day in workouts) {
  container.innerHTML += createTable(day, workouts[day]);
}

// Save to browser
function saveData() {
  const inputs = document.querySelectorAll("input");
  const data = {};

  inputs.forEach(input => {
    data[input.id] = input.value;
  });

  localStorage.setItem("workoutData", JSON.stringify(data));
  alert("Progress Saved ✅");
}

// Load data
function loadData() {
  const data = JSON.parse(localStorage.getItem("workoutData"));

  if (!data) {
    alert("No saved data found.");
    return;
  }

  Object.keys(data).forEach(id => {
    if (document.getElementById(id)) {
      document.getElementById(id).value = data[id];
    }
  });

  alert("Progress Loaded ✅");
}
</script>

</body>
</html>
