<!DOCTYPE html>
<html>
<head>
  <title>Football Workout Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 10px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #22c55e;
      color: black;
    }

    input {
      width: 95%;
      padding: 8px;
      text-align: center;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 12px;
      margin: 5px;
      width: 45%;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .toggle {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .toggle button {
      width: 40%;
    }

    .active {
      background: #22c55e;
    }

    .inactive {
      background: #64748b;
    }

    .calc { background: #f59e0b; width: 100%; }
    .save { background: #22c55e; }
    .load { background: #3b82f6; }
  </style>
</head>

<body>

<h1>Football Workout Tracker</h1>

<!-- TOGGLE -->
<div class="toggle">
  <button id="olBtn" class="active" onclick="setMode('OL')">Offense Line</button>
  <button id="dlBtn" class="inactive" onclick="setMode('DL')">Defense Line</button>
</div>

<!-- MAX INPUT -->
<div class="card">
  <h2>Enter Your Max</h2>
  <input id="squatMax" placeholder="Squat Max"><br><br>
  <input id="benchMax" placeholder="Bench Max"><br><br>
  <input id="deadMax" placeholder="Deadlift Max"><br><br>
  <button class="calc" onclick="applyWeights()">Auto Fill Weights</button>
</div>

<div id="workout"></div>

<div style="text-align:center;">
  <button class="save" onclick="saveData()">Save</button>
  <button class="load" onclick="loadData()">Load</button>
</div>

<script>

let mode = "OL";

const OL = [
  {name:"Day 1 – Lower Strength", exercises:["Squat","Trap Deadlift","Lunges"]},
  {name:"Day 2 – Upper Strength", exercises:["Bench Press","Row","Face Pull"]},
  {name:"Day 3 – Power", exercises:["Deadlift","Box Squat","Farmer Carry"]}
];

const DL = [
  {name:"Day 1 – Lower Burst", exercises:["Squat","Trap Deadlift","Box Jump"]},
  {name:"Day 2 – Upper Power", exercises:["Bench Press","Push Press","Row"]},
  {name:"Day 3 – Explosive", exercises:["Deadlift","Broad Jump","Sled Push"]}
];

const container = document.getElementById("workout");

function setMode(newMode) {
  mode = newMode;

  document.getElementById("olBtn").className = mode==="OL" ? "active" : "inactive";
  document.getElementById("dlBtn").className = mode==="DL" ? "active" : "inactive";

  render();
}

// BUILD WORKOUT
function render() {
  container.innerHTML = "";
  const workouts = mode === "OL" ? OL : DL;

  workouts.forEach((day, d) => {
    let html = `<div class="card"><h2>${day.name}</h2><table>`;
    html += "<tr><th>Exercise</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th></tr>";

    day.exercises.forEach((ex, e) => {
      html += `<tr><td>${ex}</td>`;
      for (let s=0;s<5;s++) {
        html += `<td><input id="${mode}-${d}-${e}-${s}"></td>`;
      }
      html += "</tr>";
    });

    html += "</table></div>";
    container.innerHTML += html;
  });
}

render();

// AUTO WEIGHTS
function applyWeights() {
  let squat = Number(document.getElementById("squatMax").value);
  let bench = Number(document.getElementById("benchMax").value);
  let dead = Number(document.getElementById("deadMax").value);

  const pct = [0.65,0.7,0.75,0.75,0.8];

  const workouts = mode === "OL" ? OL : DL;

  workouts.forEach((day,d)=>{
    day.exercises.forEach((ex,e)=>{

      let max = 0;
      if(ex.includes("Squat")) max=squat;
      if(ex.includes("Bench")) max=bench;
      if(ex.includes("Dead")) max=dead;

      for(let s=0;s<5;s++){
        let input = document.getElementById(`${mode}-${d}-${e}-${s}`);
        if(max>0){
          let w = Math.round(max*pct[s]/5)*5;
          input.value = w + " x ";
        }
      }
    });
  });

  alert("Weights Added ✅");
}

// SAVE
function saveData(){
  let inputs = document.querySelectorAll("input");
  let data = {};
  inputs.forEach(i=>data[i.id]=i.value);
  localStorage.setItem("fbTracker",JSON.stringify(data));
  alert("Saved ✅");
}

// LOAD
function loadData(){
  let data = JSON.parse(localStorage.getItem("fbTracker"));
  if(!data) return alert("No data");

  Object.keys(data).forEach(id=>{
    let el=document.getElementById(id);
    if(el) el.value=data[id];
  });

  alert("Loaded ✅");
}

</script>

</body>
</html>
